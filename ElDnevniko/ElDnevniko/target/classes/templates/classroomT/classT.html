<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shkolo Style</title>
  <link rel="stylesheet" href="classT.css">
</head>
<body>

<div class="container">

  <!-- SUBJECT BOX -->
  <div class="subjects-box">

    <input type="text" id="selectionBox" placeholder="Избери..." readonly>

    <button id="addBtn" onclick="goToPage()" style="display:none; margin-bottom:10px;">
      Add grades
    </button>

    <button onclick="toggleSubjects()">Sub</button>

    <div class="menu-wrapper">

      <ul id="subjectsList">
        <li><button onclick="showClasses('Math')">Math</button></li>
        <li><button onclick="showClasses('English')">English</button></li>
        <li><button onclick="showClasses('Biology')">Biology</button></li>
        <li><button onclick="showClasses('History')">History</button></li>
        <li><button onclick="showClasses('Physics')">Physics</button></li>
        <li><button onclick="showClasses('Geography')">Geography</button></li>
        <li><button onclick="showClasses('IT')">IT</button></li>
      </ul>

      <div id="classesBox">
        <button onclick="selectClass(8)">8 клас</button>
        <button onclick="selectClass(9)">9 клас</button>
        <button onclick="selectClass(10)">10 клас</button>
        <button onclick="selectClass(11)">11 клас</button>
        <button onclick="selectClass(12)">12 клас</button>
      </div>

    </div>
  </div>

  <!-- STUDENTS -->
  <div class="grades-box">
    <div class="row">1 | Nikolai | 6,4,5</div>
    <div class="row">2 | Kristian | 3,2,5</div>
    <div class="row">3 | __________ | ______</div>
  </div>

  <!-- IMAGE -->
  <div class="image-box">
    <img src="diagram.png" alt="diagram">
  </div>

</div>

<script src="classT.js"></script>
</body>
</html>

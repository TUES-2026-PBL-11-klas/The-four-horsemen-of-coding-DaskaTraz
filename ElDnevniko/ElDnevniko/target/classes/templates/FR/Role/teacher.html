<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Info</title>
  <link rel="stylesheet" href="teacher.css">
</head>
<body>


  <div class="container">
    <div class="card">
      <h2>Teacher Information</h2>


      <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>


        <label>Classes You Teach</label>


        <!-- Selected classes -->
        <div id="selectedClasses" class="selected-classes"></div>


        <!-- Selectors -->
        <div class="select-row">
          <select id="grade">
            <option value="">Grade</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>
            <option>11</option>
            <option>12</option>
          </select>


          <select id="classLetter">
            <option value="">Class</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>
          </select>


          <button type="button" onclick="addClass()">Add</button>
        </div>


        <label>Subject</label>
        <input type="text" placeholder="What do you teach?" required>


        <button type="submit">Finish</button>
      </form>


    </div>
  </div>


  <script>
    function addClass() {
      const grade = document.getElementById("grade").value;
      const letter = document.getElementById("classLetter").value;


      if (!grade || !letter) {
        alert("Please select both grade and class!");
        return;
      }


      const combined = grade + letter;
      const container = document.getElementById("selectedClasses");


      // Prevent duplicates
      const existing = Array.from(container.children).map(el => el.innerText.replace('✖','').trim());
      if (existing.includes(combined)) {
        alert("Already added!");
        return;
      }


      const tag = document.createElement("div");
      tag.className = "class-tag";
      tag.innerHTML = combined + ' <span onclick="this.parentElement.remove()">✖</span>';


      container.appendChild(tag);
    }
  </script>


</body>
</html>

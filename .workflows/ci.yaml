name: CI/CD Pipeline

on:
  push:
    branches:
      - VOT

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package #-DskipTests

      - name: Run tests
        run: mvn test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t victoruncho/springboot-app:$IMAGE_TAG .
          docker push victoruncho/springboot-app:$IMAGE_TAG

      - name: Update image tag in k8s manifest
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed -i "s|image: victoruncho/springboot-app:.*|image: victoruncho/springboot-app:$IMAGE_TAG|" k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push

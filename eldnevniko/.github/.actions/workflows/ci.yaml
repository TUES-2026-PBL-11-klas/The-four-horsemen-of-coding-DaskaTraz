name: CI/CD Pipeline

on:
  push:
    branches:
      - '*'
    # paths-ignore:
    #   - 'k8s/**'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # permissions:
    #   contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run tests
        run: mvn test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=vikt0rinho/backend
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Update backend image tag in manifest
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=vikt0rinho/backend
          sed -i -E "s#image: \"[^\"]+\"#image: \"$IMAGE_NAME:$IMAGE_TAG\"#" k8s/backend.yaml

      - name: Commit updated manifests
        run: |
          IMAGE_TAG=${{ github.sha }}
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/backend.yaml
          if git diff --cached --quiet; then
            echo "No manifest change to commit"
          else
            git commit -m "ci: update backend image tag to $IMAGE_TAG"
            git push
          fi
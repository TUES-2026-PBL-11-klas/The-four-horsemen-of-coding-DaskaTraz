apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-backend
  namespace: backend 
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spring-api 
  template:
    metadata:
      labels:
        app: spring-api
    spec:
      containers:
      - name: spring-app
        image: "vikt0rinho/backend:311f51689c9d243d187008a38dfe89d3cb5dc86c" 
        ports:
        - containerPort: 8080
        env:
        - name: DB_URL
          value: "jdbc:postgresql://postgres-service.database.svc.cluster.local:5432/mydb"
        - name: DB_PASSWORD
          value: ""
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-backend
  namespace: backend 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-api 
  template:
    metadata:
      labels:
        app: spring-api
    spec:
      containers:
      - name: spring-app
        image: "vikt0rinho/backend:3f4bbd22122ec1261041f02d80099b42e6f3ad4c" 
        ports:
        - containerPort: 8080
        env:
        - name: DB_URL
          value: "jdbc:postgresql://postgres-service.database.svc.cluster.local:5432/mydb"
        - name: DB_PASSWORD
          value: ""